<!DOCTYPE html>
<html>
<body>

<button onclick="run()">Run</button>

<pre id="out"></pre>

<script>

function run(){

fetch("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",{

method:"GET",

mode:"cors",

credentials:"include",

headers:{
"Accept":"*/*",
"Accept-Language":"en-US,en;q=0.9"
}

})
.then(r=>r.text())
.then(t=>{
document.getElementById("out").textContent=t
})
.catch(e=>{
document.getElementById("out").textContent=e
})

}

</script>

</body>
</html>
