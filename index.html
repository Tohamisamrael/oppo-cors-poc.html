<!DOCTYPE html>
<html>
<body>

<button onclick="run()">RUN</button>

<pre id="out"></pre>

<script>

const endpoints = [

"https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
"https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1",
"https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit",
"https://www.opposhop.cn/cn/oapi/users/web/member/info"

]

function run(){

for (let url of endpoints){

fetch(url,{
method:"GET",
credentials:"include",
headers:{
"Accept":"application/json, text/plain, */*",
"Cache-Control":"no-cache"
}
})
.then(r=>r.text())
.then(t=>{
document.getElementById("out").textContent += "\n"+url+"\n"+t+"\n\n"
})
.catch(e=>{
document.getElementById("out").textContent += "\n"+url+"\nERROR:"+e+"\n\n"
})

}

}

</script>

</body>
</html>
