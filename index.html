<!DOCTYPE html>
<html>
<body>

<button onclick="test()">Run</button>

<pre id="out"></pre>

<script>

function test(){

fetch("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",{
method:"POST",
credentials:"include",
headers:{
"Content-Type":"text/plain"
},
body:"test"
})

.then(r=>r.text())
.then(t=>{
document.getElementById("out").textContent=t
})
.catch(e=>{
document.getElementById("out").textContent=e
})

}

</script>

</body>
</html>
