<!DOCTYPE html>
<html>
<body>

<button onclick="run()">Run Test</button>

<pre id="out"></pre>

<script>

const endpoints = {

cart:"https://www.opposhop.cn/cn/oapi/orders/web/cart/v1/list",
count:"https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",
coupon:"https://www.opposhop.cn/cn/oapi/users/web/coupons/count?state=1",
credit:"https://www.opposhop.cn/cn/oapi/users/web/credits/getUserCredit"

};

function run(){

for(let name in endpoints){

fetch(endpoints[name],{

method:"GET",

credentials:"include",

headers:{
"Accept":"application/json",
"X-Requested-With":"XMLHttpRequest"
}

})

.then(r=>r.text())

.then(t=>{

document.getElementById("out").textContent +=
"\n"+name+" -> "+t+"\n";

})

.catch(e=>{

document.getElementById("out").textContent +=
"\n"+name+" ERROR -> "+e+"\n";

});

}

}

</script>

</body>
</html>
